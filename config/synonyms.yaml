import yaml

# 加载同义词配置文件
def load_synonyms(file_path="synonyms.yaml"):
    with open(file_path, "r", encoding="utf-8") as f:
        return yaml.safe_load(f)

# 同义词替换函数（将文献关键词统一为标准术语）
def replace_synonyms(keyword, synonyms_dict):
    for category, term_map in synonyms_dict.items():
        for standard_term, synonyms in term_map.items():
            if keyword in synonyms:
                return standard_term
    return keyword  # 无匹配同义词则返回原关键词
